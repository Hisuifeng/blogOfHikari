<script>
  (function() {
    const navMenu = document.getElementById('navMenu');
    const hamburgerBtn = document.getElementById('hamburgerBtn');
    const hamburgerSpan = hamburgerBtn?.querySelector('span');
    if (!navMenu || !hamburgerBtn || !hamburgerSpan) return;

    const MOBILE_BREAKPOINT = 768;
    let isMenuOpen = false;

    // 更新图标：切换字符并控制旋转类
    function updateIcon(open) {
      hamburgerSpan.textContent = open ? '✕' : '☰';
      hamburgerBtn.classList.toggle('is-open', open);
      hamburgerBtn.setAttribute('aria-expanded', open);
    }

    function closeMenu() {
      navMenu.classList.remove('show');
      isMenuOpen = false;
      updateIcon(false);
    }

    function openMenu() {
      if (window.innerWidth <= MOBILE_BREAKPOINT) {
        navMenu.classList.add('show');
        isMenuOpen = true;
        updateIcon(true);
      }
    }

    function toggleMenu(e) {
      e.stopPropagation();
      if (window.innerWidth > MOBILE_BREAKPOINT) return;
      isMenuOpen ? closeMenu() : openMenu();
    }

    function resetForDesktop() {
      navMenu.classList.remove('show');
      isMenuOpen = false;
      updateIcon(false);
    }

    function handleViewportChange() {
      if (window.innerWidth > MOBILE_BREAKPOINT) {
        resetForDesktop();
      } else {
        if (isMenuOpen) closeMenu();
        navMenu.classList.remove('show');
        updateIcon(false);
      }
    }

    hamburgerBtn.addEventListener('click', toggleMenu);

    navMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth <= MOBILE_BREAKPOINT && isMenuOpen) closeMenu();
      });
    });

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(handleViewportChange, 80);
    });

    document.addEventListener('click', (e) => {
      if (window.innerWidth <= MOBILE_BREAKPOINT && isMenuOpen) {
        if (!hamburgerBtn.contains(e.target) && !navMenu.contains(e.target)) {
          closeMenu();
        }
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && isMenuOpen && window.innerWidth <= MOBILE_BREAKPOINT) {
        closeMenu();
        hamburgerBtn.focus();
      }
    });

    handleViewportChange();
  })();
</script>
